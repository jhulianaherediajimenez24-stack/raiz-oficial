<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | RAÍZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #c5a059; --negro: #0a0a0a; --gris: #1a1a1a; }
        body { background: var(--negro); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; margin: 0; }
        
        h1 { font-family: 'Cinzel', serif; color: var(--oro); text-align: center; border-bottom: 2px solid var(--oro); padding-bottom: 20px; margin-bottom: 30px; letter-spacing: 5px; }
        
        .container { max-width: 800px; margin: auto; }
        
        .btn-refresh { 
            background: var(--oro); color: black; width: 100%; border: none; padding: 15px; 
            font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; margin-bottom: 30px; letter-spacing: 2px;
        }

        .reserva-card { 
            background: var(--gris); margin-bottom: 20px; padding: 20px; border-radius: 8px; 
            border-left: 5px solid #444; position: relative; transition: 0.3s;
        }
        
        .reserva-card.confirmada { border-left-color: #2ecc71; }
        
        .nombre-cliente { color: var(--oro); font-family: 'Cinzel', serif; font-size: 1.4rem; margin: 0 0 10px 0; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; color: #ccc; }
        
        .dato { margin-bottom: 5px; }
        .dato span { color: var(--oro); font-weight: 600; }

        .alergias-box { background: #331a1a; padding: 10px; border-radius: 5px; margin-top: 15px; color: #ff9999; font-size: 0.85rem; border: 1px solid #552222; }

        .estado-badge { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .pendiente { background: #e67e22; color: white; }
        .confirmada-badge { background: #2ecc71; color: white; }

        .btn-confirmar { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>RESERVAS RAÍZ</h1>
        <button class="btn-refresh" onclick="cargarReservas()">ACTUALIZAR LISTA</button>

        <div id="lista-reservas">
            <p style="text-align:center">Cargando reservas...</p>
        </div>
    </div>

    <script>
        // Dirección de tu servidor (Cerebro)
        const API_URL = "https://restaurante-raiz.onrender.com";

        async function cargarReservas() {
            try {
                const res = await fetch(`${API_URL}/admin/reservas`);
                const reservas = await res.json();
                const contenedor = document.getElementById('lista-reservas');
                contenedor.innerHTML = "";

                if (reservas.length === 0) {
                    contenedor.innerHTML = "<p style='text-align:center; color:#666;'>No hay solicitudes de reserva aún.</p>";
                    return;
                }

                reservas.forEach((r, index) => {
