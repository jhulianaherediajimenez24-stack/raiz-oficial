<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | RAÍZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #c5a059; --negro: #0a0a0a; --gris: #1a1a1a; }
        body { background: var(--negro); color: white; font-family: 'Montserrat', sans-serif; padding: 20px; margin: 0; }
        h1 { font-family: 'Cinzel', serif; color: var(--oro); text-align: center; border-bottom: 2px solid var(--oro); padding-bottom: 20px; margin-bottom: 30px; letter-spacing: 5px; }
        .btn-refresh { background: var(--oro); color: black; width: 100%; border: none; padding: 15px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; margin-bottom: 30px; letter-spacing: 2px; transition: 0.3s; }
        .btn-refresh:hover { background: #dfb870; }
        .reserva-card { background: var(--gris); margin-bottom: 20px; padding: 25px; border-radius: 8px; border-left: 5px solid var(--oro); position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nombre-cliente { color: var(--oro); font-family: 'Cinzel', serif; font-size: 1.5rem; margin: 0 0 10px 0; text-transform: uppercase; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; }
        .dato { color: #ccc; }
        .dato span { color: var(--oro); font-weight: 600; }
        .tag-ocasion { background: rgba(197, 160, 89, 0.1); color: var(--oro); padding: 5px 10px; border-radius: 4px; display: inline-block; margin-top: 15px; font-size: 0.8rem; border: 1px solid var(--oro); }
    </style>
</head>
<body>
    <h1>GESTIÓN DE RESERVAS</h1>
    <button class="btn-refresh" onclick="cargar()">ACTUALIZAR LISTA DE CLIENTES</button>
    <div id="lista-reservas"></div>

    <script>
        const API_URL = "https://restaurante-raiz.onrender.com";

        async function cargar() {
            try {
                const res = await fetch(`${API_URL}/admin/reservas`);
                const reservas = await res.json();
                const contenedor = document.getElementById('lista-reservas');
                contenedor.innerHTML = "";

                if (reservas.length === 0) {
                    contenedor.innerHTML = "<p style='text-align:center; color:#666;'>No hay solicitudes de reserva aún.</p>";
                    return;
                }

                reservas.reverse().forEach((r) => {
                    const card = document.createElement('div');
                    card.className = 'reserva-card';
                    card.innerHTML = `
                        <h3 class="nombre-cliente">${r.nombre}</h3>
                        <div class="grid-info">
                            <div class="dato"><span>📱 Cel:</span> ${r.celular}</div>
                            <div class="dato"><span>📧 Correo:</span> ${r.correo}</div>
                            <div class="dato"><span>📅 Fecha:</span> ${r.fecha}</div>
                            <div class="dato"><span>⏰ Hora:</span> ${r.hora}</div>
                            <div class="dato"><span>👥 Personas:</span> ${r.personas}</div>
                            <div class="dato"><span>📍 Mesa:</span> ${r.ubicacion}</div>
                        </div>
                        ${r.ocasion ? `<div class="tag-ocasion">✨ Motivo: ${r.ocasion}</div>` : ''}
                    `;
                    contenedor.appendChild(card);
                });
            } catch (e) { 
                console.error(e);
                alert("Error al conectar con el Cerebro."); 
            }
        }
        window.onload = cargar;
    </script>
</body>
</html>
