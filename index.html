<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZ | Reservar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #c5a059; --negro: #0a0a0a; --gris: #121212; }
        body { background-color: var(--negro); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; }
        
        header { 
            height: 45vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.postimg.cc/nz5YS280/file-00000000d4fc71f589f31464c432a1bd.png'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid var(--oro);
        }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--oro); margin: 0; letter-spacing: 12px; }

        .container { max-width: 500px; margin: auto; padding: 40px 20px; }
        .reserva-form { display: flex; flex-direction: column; gap: 20px; }
        
        .row { display: flex; gap: 15px; text-align: left; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        label { font-size: 0.7rem; color: var(--oro); letter-spacing: 1px; text-transform: uppercase; }
        input, select, textarea { 
            background: transparent; border: none; border-bottom: 1px solid #333; 
            color: white; padding: 12px 5px; width: 100%; outline: none; font-size: 1rem; box-sizing: border-box;
        }
        input:focus, select:focus { border-bottom-color: var(--oro); }
        option { background: #000; color: #fff; }

        .btn-reserva { 
            background: var(--oro); color: #000; padding: 20px; border: none; 
            cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; 
            letter-spacing: 3px; margin-top: 20px; transition: 0.3s;
        }
        .btn-reserva:hover { background: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>RAÍZ</h1>
    </header>

    <div class="container">
        <div class="reserva-form">
            <input type="text" id="nombre" placeholder="NOMBRE COMPLETO">
            <input type="email" id="correo" placeholder="CORREO ELECTRÓNICO">
            <input type="tel" id="celular" placeholder="NÚMERO DE CELULAR">
            
            <div class="row">
                <div class="col">
                    <label>Fecha</label>
                    <input type="date" id="fecha_dia">
                </div>
                <div class="col">
                    <label>Hora</label>
                    <select id="fecha_hora">
                        </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col">
                    <label>Personas</label>
                    <select id="personas" onchange="verificarPersonas()">
                        <option value="2">2 PERSONAS</option>
                        <option value="4">4 PERSONAS</option>
                        <option value="6">6 PERSONAS</option>
                        <option value="otro">MÁS DE 6...</option>
                    </select>
                </div>
                <div class="col" id="col-otro" style="display:none">
                    <label>Especificar</label>
                    <input type="number" id="num_exacto" placeholder="¿Cuántos?">
                </div>
            </div>

            <select id="ubicacion">
                <option value="" disabled selected>POSICIÓN DE LA MESA</option>
                <option value="Ventana">CERCA A LA VENTANA</option>
                <option value="Bar">CERCA AL BAR</option>
                <option value="Parrilla">CERCA A LA PARRILLA</option>
                <option value="Cualquiera">CUALQUIER POSICIÓN</option>
            </select>

            <textarea id="alergias" placeholder="¿ALGUNA ALERGIA O PREFERENCIA?" rows="2"></textarea>
            
            <button class="btn-reserva" onclick="enviarReserva()">RESERVAR</button>
        </div>
    </div>

    <script>
        const API_URL = "https://restaurante-raiz.onrender.com";

        // 1. Generar horas de 12:00 a 22:00
        const selectHora = document.getElementById('fecha_hora');
        for(let h=12; h<=22; h++) {
            let horaLabel = h > 12 ? (h-12) + ":00 PM" : h + ":00 PM";
            if(h === 12) horaLabel = "12:00 PM";
            if(h === 22) horaLabel = "10:00 PM";
            
            let option = new Option(horaLabel, h + ":00");
            selectHora.add(option);
        }

        // 2. Mostrar cuadro si eligen "Más de 6"
        function verificarPersonas() {
            const val = document.getElementById('personas').value;
            document.getElementById('col-otro').style.display = (val === 'otro') ? 'flex' : 'none';
        }

        async function enviarReserva() {
            const nombre = document.getElementById('nombre').value;
            const correo = document.getElementById('correo').value;
            const celular = document.getElementById('celular').value;
            const dia = document.getElementById('fecha_dia').value;
            const hora = document.getElementById('fecha_hora').value;
            const ubicacion = document.getElementById('ubicacion').value;
            
            let cantPersonas = document.getElementById('personas').value;
            if(cantPersonas === 'otro') {
                cantPersonas = document.getElementById('num_exacto').value;
            }

            if (!nombre || !correo || !celular || !dia || !cantPersonas || !ubicacion) {
                alert("Por favor, completa todos los campos.");
                return;
            }

            const datos = { 
                nombre, correo, celular, 
                fecha: `${dia} ${hora}`, 
                personas: cantPersonas, 
                ubicacion, 
                alergias: document.getElementById('alergias').value,
                estado: 'Pendiente' 
            };

            try {
                const response = await fetch(`${API_URL}/reservar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                if(response.ok) {
                    alert("Reserva enviada con éxito.");
                    location.reload();
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            }
        }
    </script>
</body>
</html>
