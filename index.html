<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZ | Reservar</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #c5a059; --negro: #0a0a0a; --gris: #121212; }
        body { background-color: var(--negro); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; }
        header { padding: 50px 20px; border-bottom: 1px solid var(--oro); }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--oro); margin: 0; letter-spacing: 10px; }
        .container { max-width: 500px; margin: auto; padding: 40px 20px; }
        .reserva-form { display: flex; flex-direction: column; gap: 20px; }
        input, select, textarea { 
            background: transparent; border: none; border-bottom: 1px solid #333; 
            color: white; padding: 15px 5px; width: 100%; outline: none; font-size: 1rem;
        }
        input:focus, select:focus { border-bottom-color: var(--oro); }
        .btn-reserva { 
            background: var(--oro); color: #000; padding: 20px; border: none; 
            cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; 
            letter-spacing: 2px; margin-top: 20px;
        }
        label { font-size: 0.8rem; color: var(--oro); text-align: left; margin-bottom: -10px; }
    </style>
</head>
<body>

    <header>
        <h1>RAÍZ</h1>
    </header>

    <div class="container">
        <div class="reserva-form">
            <input type="text" id="nombre" placeholder="NOMBRE COMPLETO">
            <input type="email" id="correo" placeholder="CORREO ELECTRÓNICO">
            <input type="tel" id="celular" placeholder="NÚMERO DE CELULAR">
            
            <label>FECHA Y HORA (12:00 PM - 10:00 PM)</label>
            <input type="datetime-local" id="fecha">
            
            <select id="personas">
                <option value="" disabled selected>NÚMERO DE PERSONAS</option>
                <option value="2">2 PERSONAS</option>
                <option value="4">4 PERSONAS</option>
                <option value="6">6 PERSONAS</option>
            </select>

            <select id="ubicacion">
                <option value="" disabled selected>POSICIÓN DE LA MESA</option>
                <option value="Ventana">CERCA A LA VENTANA</option>
                <option value="Bar">CERCA AL BAR</option>
                <option value="Parrilla">CERCA A LA PARRILLA</option>
                <option value="Cualquiera">CUALQUIER POSICIÓN</option>
            </select>

            <textarea id="alergias" placeholder="¿ALGUNA ALERGIA O PREFERENCIA?" rows="2"></textarea>
            
            <button class="btn-reserva" onclick="enviarReserva()">RESERVAR</button>
        </div>
    </div>

    <script>
        // DIRECCIÓN CORREGIDA PARA TU SERVIDOR
        const API_URL = "https://restaurante-raiz.onrender.com";

        async function enviarReserva() {
            const nombre = document.getElementById('nombre').value;
            const correo = document.getElementById('correo').value;
            const celular = document.getElementById('celular').value;
            const fechaVal = document.getElementById('fecha').value;
            const personas = document.getElementById('personas').value;
            const ubicacion = document.getElementById('ubicacion').value;

            if (!nombre || !correo || !celular || !fechaVal || !ubicacion || !personas) {
                alert("Por favor, complete todos los campos.");
                return;
            }

            // VALIDACIÓN DE HORARIO: 12 PM (12h) A 10 PM (22h)
            const hora = new Date(fechaVal).getHours();
            if (hora < 12 || hora >= 22) {
                alert("Reservas disponibles solo de 12:00 PM a 10:00 PM.");
                return;
            }

            const datos = { 
                nombre, correo, celular, fecha: fechaVal, 
                personas, ubicacion, 
                alergias: document.getElementById('alergias').value,
                estado: 'Pendiente' 
            };

            try {
                const response = await fetch(`${API_URL}/reservar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                if(response.ok) {
                    alert("Reserva enviada con éxito.");
                    location.reload();
                } else {
                    alert("Error en el servidor.");
                }
            } catch (error) {
                alert("Error de conexión. Verifica que tu Web Service en Render esté encendido.");
            }
        }
    </script>
</body>
</html>
