<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAÍZ | Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #c5a059; --negro: #0a0a0a; }
        body { background-color: var(--negro); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; }
        header { 
            height: 40vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.postimg.cc/nz5YS280/file-00000000d4fc71f589f31464c432a1bd.png'); 
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; border-bottom: 2px solid var(--oro);
        }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--oro); letter-spacing: 10px; }
        .container { max-width: 400px; margin: auto; padding: 30px 20px; }
        input, select { 
            background: transparent; border: none; border-bottom: 1px solid #444; 
            color: white; padding: 10px; width: 100%; outline: none; margin-bottom: 20px;
        }
        .btn-reserva { 
            background: var(--oro); color: #000; padding: 15px; border: none; width: 100%;
            cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <header><h1>RAÍZ</h1></header>
    <div class="container">
        <input type="text" id="nombre" placeholder="NOMBRE COMPLETO">
        <input type="tel" id="celular" placeholder="CELULAR">
        <input type="date" id="fecha">
        <select id="ubicacion">
            <option value="Terraza">TERRAZA</option>
            <option value="Salón Principal">SALÓN PRINCIPAL</option>
            <option value="Bar">BAR</option>
        </select>
        <button class="btn-reserva" onclick="enviar()">SOLICITAR RESERVA</button>
    </div>

    <script>
        async function enviar() {
            const datos = {
                nombre: document.getElementById('nombre').value,
                celular: document.getElementById('celular').value,
                fecha: document.getElementById('fecha').value,
                ubicacion: document.getElementById('ubicacion').value
            };

            try {
                const res = await fetch("https://restaurante-raiz.onrender.com/reservar", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(datos)
                });
                if(res.ok) alert("¡Reserva enviada con éxito!");
            } catch(e) { alert("Error al conectar con el servidor."); }
        }
    </script>
</body>
</html>
