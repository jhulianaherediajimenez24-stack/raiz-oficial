<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel RAÍZ | Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; padding: 20px; }
        h1 { font-family: 'Cinzel', serif; color: #c5a059; text-align: center; border-bottom: 2px solid #c5a059; padding-bottom: 10px; }
        .reserva-card { background: #1a1a1a; margin-bottom: 15px; padding: 20px; border-radius: 10px; border-left: 5px solid #444; position: relative; }
        .reserva-card.confirmada { border-left-color: #2ecc71; }
        .info { font-size: 0.9rem; color: #ccc; margin-bottom: 5px; }
        .badge { position: absolute; top: 20px; right: 20px; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .pendiente { background: #e67e22; }
        .confirmada-badge { background: #2ecc71; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-check { background: #2ecc71; color: white; }
        .btn-refresh { background: #c5a059; color: black; width: 100%; margin-bottom: 20px; padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Panel de Control RAÍZ</h1>
    <button class="btn-refresh" onclick="cargarReservas()">ACTUALIZAR LISTA</button>

    <div id="lista-reservas">
        <p style="text-align:center">Cargando...</p>
    </div>

    <script>
        // ESTA DIRECCIÓN DEBE SER LA MISMA QUE EN INDEX.HTML
        const API_URL = "https://restaurante-raiz.onrender.com";

        async function cargarReservas() {
            try {
                const res = await fetch(`${API_URL}/admin/reservas`);
                const reservas = await res.json();
                const contenedor = document.getElementById('lista-reservas');
                contenedor.innerHTML = "";

                if (reservas.length === 0) {
                    contenedor.innerHTML = "<p style='text-align:center'>No hay reservas registradas.</p>";
                    return;
                }

                reservas.forEach((r, index) => {
                    const card = document.createElement('div');
                    card.className = `reserva-card ${r.estado === 'Confirmada' ? 'confirmada' : ''}`;
                    card.innerHTML = `
                        <div class="badge ${r.estado === 'Pendiente' ? 'pendiente' : 'confirmada-badge'}">${r.estado}</div>
                        <h3 style="color:#c5a059; margin:0 0 10px 0;">${r.nombre}</h3>
                        <div class="info">📧 ${r.correo}</div>
                        <div class="info">📱 ${r.celular}</div>
                        <div class="info">👥 Personas: ${r.personas} | 📍 Ubicación: ${r.ubicacion}</div>
                        <div class="info">📅 Fecha: ${new Date(r.fecha).toLocaleString()}</div>
                        <div class="info">⚠️ Alergias: ${r.alergias || 'Ninguna'}</div>
                        
                        <div class="btn-group">
                            ${r.estado === 'Pendiente' ? `<button class="btn-check" onclick="confirmar(${index})">CONFIRMAR</button>` : ''}
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            } catch (e) {
                document.getElementById('lista-reservas').innerHTML = "<p style='text-align:center; color:red;'>Error al conectar con el servidor.</p>";
            }
        }

        async function confirmar(id) {
            await fetch(`${API_URL}/admin/confirmar/${id}`, { method: 'POST' });
            cargarReservas();
        }

        window.onload = cargarReservas;
    </script>
</body>
</html>
